<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title><%= htmlWebpackPlugin.options.title %></title>
</head>
<body>
<header class="main-header">
  <h1>Lifeform Simulator</h1>
</header>
<div class="universe">
  <div class="world-container">
    <div class="world">
    </div>
  </div>

  <div class="sidebar">
    <div class="stats-card">
      <h3>Simulation Status</h3>
      <div class="stat-item" id="generation-stat">
        <strong>Generation:</strong> <span id="generation-value">0</span>
      </div>
      <div class="stat-item" id="year-stat">
        <strong>Year:</strong> <span id="year-value">0</span>
      </div>
      <div class="stat-item">
        <strong>Population:</strong> <span id="population-value">-</span>
      </div>
    </div>

    <div class="controls-card">
      <div class="button-group">
        <button id="regenerateWorld">Restart</button>
        <button id="toggleSimulation">Pause</button>
        <button id="continueSimulation">Continue</button>
      </div>
      <div class="stat-item" style="margin-top: 15px;">
        <label for="speed-slider">Speed:</label>
        <input type="range" id="speed-slider" min="1" max="200" value="50">
      </div>
    </div>

    <div class="brain-card">
      <h3>Brain (Genome)</h3>
      <div id="brain-output">
      </div>
    </div>

    <div class="lifeform-card">
      <h3>Selected Lifeform</h3>
      <div id="cell-selected"><strong>ID:</strong> <span>-</span></div>
      <div id="posx"><strong>Position X:</strong> <span>-</span></div>
      <div id="posy"><strong>Position Y:</strong> <span>-</span></div>
      <div id="energy"><strong>Energy:</strong> <span>-</span></div>
      <hr>
      <div id="genome-length"><strong>Genome Length:</strong> <span>-</span></div>
      <div id="sensory-inputs"><strong>Sensory Inputs:</strong> <span>-</span></div>
      <div id="inner-neurons"><strong>Inner Neurons:</strong> <span>-</span></div>
      <div id="action-outputs"><strong>Action Outputs:</strong> <span>-</span></div>
    </div>

    <div class="log-card">
      <h3>Log</h3>
      <div id="log-output"></div>
    </div>
  </div>
</div>
<section class="data-table-container">
  <h2>All Lifeforms</h2>
  <div class="table-wrapper">
    <table>
      <thead>
      <tr>
        <th>ID</th>
        <th>Gen</th>
        <th>Status</th>
        <th>Position (X, Y)</th>
        <th>Energy</th>
        <th>Age</th>
        <th>Direction</th>
      </tr>
      </thead>
      <tbody id="lifeform-table-body">
      </tbody>
    </table>
  </div>
</section>
</body>
</html>
